name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - dev
      - stage
      - staging
      - main
  pull_request:
    branches:
      - dev
      - stage
      - staging
      - main

jobs:
  build:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Create Env File
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "EXPO_PUBLIC_BACKEND_URL=${{ secrets.EXPO_PUBLIC_BACKEND_URL_PROD }}" >> .env
            echo "EXPO_PUBLIC_APP_ENV=production" >> .env
            echo "EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> .env
          elif [ "${{ github.ref_name }}" = "stage" ] || [ "${{ github.ref_name }}" = "staging" ]; then
            echo "EXPO_PUBLIC_BACKEND_URL=${{ secrets.EXPO_PUBLIC_BACKEND_URL_STAGE }}" >> .env
            echo "EXPO_PUBLIC_APP_ENV=staging" >> .env
            echo "EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> .env
          else
            echo "EXPO_PUBLIC_BACKEND_URL=${{ secrets.EXPO_PUBLIC_BACKEND_URL_DEV }}" >> .env
            echo "EXPO_PUBLIC_APP_ENV=development" >> .env
            echo "EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}" >> .env
          fi
          echo "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "EXPO_PUBLIC_VAPID_KEY=${{ secrets.EXPO_PUBLIC_VAPID_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}" >> .env

      - name: Install Dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Decode Android Keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: ./frontend/android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Android App (APK & AAB)
        working-directory: ./frontend/android
        env:
          ANDROID_KEYSTORE_FILE: "release.keystore"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ github.ref_name }}" = "stage" ] || [ "${{ github.ref_name }}" = "staging" ]; then
            ./gradlew assembleStaging bundleStaging --no-daemon
          else
            ./gradlew assembleRelease bundleRelease --no-daemon
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: frontend/android/app/build/outputs/apk/*/*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: frontend/android/app/build/outputs/bundle/*/*.aab
